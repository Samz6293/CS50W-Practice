<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hello!</title>

        <!-- Media Query Example -->
         <style>
            @media (min-width: 600px) {
                body {
                    background-color: blue;
                }
            }

            @media (max-width: 599px) {
                body {
                    background-color: grey;
                }
            }
            
         </style>
    </head>
    <body>
        <h1>Welcome to my page</h1>
        <p> If max width is 599px color is grey</p>
        <p>If minimun width is 600px color is blue</p>
    </body>
</html>
