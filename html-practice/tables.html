<!DOCTYPE html>
<html>
    <head>
        <title>Tables</title>
        <meta charset="UTF-8">
    </head>
    <body>
         <table>       <!-- Represents the entire table-->
            <thead>    <!-- Represents the headings-->
                <tr>   <!-- These are rows of data-->    
                    <!--headings name-->
                    <th>Ocean</th>
                    <th>Avg. Depth</th>
                    <th>Max Depth</th>
                </tr>
            </thead>

            <tbody>     <!-- Represents the table body-->
                <tr>    <!-- Data for each row-->
                    <td>Pacific</td> <!-- Data of that row-->
                    <td>4,280m</td>
                    <td>10,911m</td>
                </tr>
            </tbody>
         </table>
    </body>
</html>
